name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Gate - run tests
        run: uv run pytest -q

      - name: Build wheel + sdist
        run: uv build

      - name: Assert frontend bundled in wheel
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          ok = any(n.startswith("mcpbin/frontend/") and n.endswith("index.html") for n in names)
          sys.exit(0 if ok else "FAIL: wheel does not bundle mcpbin/frontend/")
          PY

      - name: Publish release assets (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes
          fi
