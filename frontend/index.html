<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mcpbin — MCP test server</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="logo.svg" width="28" height="28" alt="" />
        <div>
          <div class="brand-name">mcpbin</div>
          <div class="brand-sub">MCP test server</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-footer">
        <span class="sidebar-status" id="sidebar-status">Initializing…</span>
      </div>
    </aside>
    <div class="main-col">
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search-input" class="search-input" type="search" placeholder="Search tools, resources, prompts…" autocomplete="off" spellcheck="false" aria-label="Search" />
          <kbd class="search-hint">/</kbd>
        </div>
        <div class="topbar-actions">
          <span class="status-dot" id="status-dot"></span>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
