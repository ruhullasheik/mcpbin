<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mcpbin — MCP test server</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar" id="top">
    <a class="brand" href="#top">
      <img class="logo" src="logo.svg" width="30" height="30" alt="" />
      <span class="brand-name">mcpbin</span>
      <span class="brand-sub">MCP test server</span>
    </a>
    <div class="search-wrap">
      <input
        id="search"
        type="search"
        placeholder="Search name, description, URI…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search the catalog"
      />
      <kbd class="search-hint">/</kbd>
    </div>
    <div class="badge" id="protocol-badge">MCP 2025-03-26</div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <section class="nav-section">
        <button class="nav-header" data-target="tools-list" aria-expanded="true">
          <span>Tools</span><span class="count" id="tools-count"></span>
        </button>
        <ul class="nav-list" id="tools-list"></ul>
      </section>
      <section class="nav-section">
        <button class="nav-header" data-target="resources-list" aria-expanded="true">
          <span>Resources</span><span class="count" id="resources-count"></span>
        </button>
        <ul class="nav-list" id="resources-list"></ul>
      </section>
      <section class="nav-section">
        <button class="nav-header" data-target="prompts-list" aria-expanded="true">
          <span>Prompts</span><span class="count" id="prompts-count"></span>
        </button>
        <ul class="nav-list" id="prompts-list"></ul>
      </section>
    </nav>

    <main class="content" id="content">
      <p class="hint">Loading the mcpbin catalog from <code>/mcp</code>&hellip;</p>
    </main>
  </div>

  <div class="no-results" id="no-results" hidden>No matches for &ldquo;<span id="nr-q"></span>&rdquo;.</div>

  <script src="app.js"></script>
</body>
</html>
