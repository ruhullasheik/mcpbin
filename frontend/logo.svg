<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mcpbin logo">
  <defs>
    <linearGradient id="mcpbinGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ec9b0"/>
      <stop offset="0.55" stop-color="#6cb6ff"/>
